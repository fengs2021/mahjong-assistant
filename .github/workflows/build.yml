name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653'

      - name: Setup Gradle 8.5
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle-8.5-bin.zip
          unzip -qo /tmp/gradle-8.5-bin.zip -d /tmp

      - name: Extract libc++_shared.so
        run: |
          NDK=$ANDROID_HOME/ndk/25.2.9519653
          mkdir -p app/src/main/jniLibs/arm64-v8a app/src/main/jniLibs/armeabi-v7a
          cp "$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" app/src/main/jniLibs/arm64-v8a/
          cp "$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/arm-linux-androideabi/libc++_shared.so" app/src/main/jniLibs/armeabi-v7a/

      - name: Build APK
        run: |
          /tmp/gradle-8.5/bin/gradle assembleDebug --no-daemon

      - name: Sign APK
        env:
          KEYSTORE_B64: ${{ secrets.MAHJONG_KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > /tmp/mahjong-fixed.keystore
            BUILD_TOOLS=$ANDROID_HOME/build-tools/34.0.0
            $BUILD_TOOLS/apksigner sign --ks /tmp/mahjong-fixed.keystore \
              --ks-pass pass:mahjong123 --ks-key-alias mahjong \
              app/build/outputs/apk/debug/app-debug.apk
          fi

      - name: Compress APK
        run: |
          xz -9kf app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mahjong-assistant
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/debug/app-debug.apk.xz
