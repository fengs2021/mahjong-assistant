name: Test ViT ONNX

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install deps
        run: pip install transformers torch onnx onnxruntime onnxscript pillow opencv-python-headless
      
      - name: Export and test ViT
        run: |
          python3 << 'PYEOF'
          import numpy as np
          from transformers import ViTForImageClassification, ViTImageProcessor
          from PIL import Image
          import torch, onnx, onnxruntime as ort, os
          
          # --- 加载模型 ---
          model_id = "pjura/mahjong_soul_vision"
          print(f"Loading {model_id}...")
          model = ViTForImageClassification.from_pretrained(model_id)
          processor = ViTImageProcessor.from_pretrained(model_id)
          model.eval()
          
          # --- 导出 ONNX ---
          dummy = torch.randn(1, 3, 224, 224)
          onnx_path = "/tmp/mahjong_vit.onnx"
          torch.onnx.export(
              model, dummy, onnx_path,
              input_names=["pixel_values"],
              output_names=["logits"],
              dynamic_axes={"pixel_values": {0: "batch"}, "logits": {0: "batch"}},
              opset_version=14
          )
          onnx_model = onnx.load(onnx_path)
          onnx.save(onnx.shape_inference.infer_shapes(onnx_model), onnx_path, save_as_external_data=False)
          print(f"ONNX: {os.path.getsize(onnx_path)/1024/1024:.1f}MB")
          
          # --- 用 onnxruntime 推理 ---
          session = ort.InferenceSession(onnx_path)
          
          # 测试图片: 用白色224x224
          test_img = Image.new('RGB', (224, 224), (255,255,255))
          inputs = processor(test_img, return_tensors="pt")
          ort_out = session.run(None, {"pixel_values": inputs["pixel_values"].numpy()})[0]
          # torch 对比验证
          with torch.no_grad():
              torch_out = model(**inputs).logits.numpy()
          diff = np.abs(ort_out - torch_out).max()
          print(f"ONNX vs Torch max diff: {diff:.6f} (should be < 1e-3)")
          assert diff < 0.01, f"ONNX output mismatch! diff={diff}"
          print("✓ ONNX export validated")
          
          # --- 用测试截图验证 ---
          # test_screenshot.jpg 已在 repo 根目录
          import cv2
          img = cv2.imread("test_screenshot.jpg")
          print(f"Test image: {img.shape}")
          
          # 手牌坐标 (模板匹配确认)
          SLOT_START, SLOT_PITCH = 536, 111
          TILE_W, TILE_H = 98, 143
          
          # 模板匹配的 ground truth (从日志)
          GT = ['1b','7b','9b','2p','2p','3p','6p','8p','5n','6n','ew','wd']
          
          id2label = model.config.id2label
          if not id2label or len(id2label) < 34:
              # Transformer可能因为num_labels=null没加载id2label
              import json, requests
              cfg = requests.get(f"https://huggingface.co/{model_id}/raw/main/config.json").json()
              id2label = cfg.get("id2label", {})
          
          print(f"\n{'slot':>4} {'gt':>3} {'pred':>4} {'conf':>6} {'match'}")
          correct = 0
          for slot in range(12):
              x = SLOT_START + slot * SLOT_PITCH
              x1 = max(0, x - TILE_W//2)
              tile = img[1106:1106+TILE_H, x1:min(img.shape[1], x1+TILE_W)]
              
              # BGR -> RGB -> PIL
              tile_rgb = cv2.cvtColor(tile, cv2.COLOR_BGR2RGB)
              tile_pil = Image.fromarray(tile_rgb).resize((224,224))
              
              inputs = processor(tile_pil, return_tensors="pt")
              logits = session.run(None, {"pixel_values": inputs["pixel_values"].numpy()})[0][0]
              
              probs = np.exp(logits - logits.max()) / np.exp(logits - logits.max()).sum()
              top_idx = int(np.argmax(logits))
              pred = id2label[str(top_idx)]
              gt = GT[slot]
              match = "✓" if pred == gt else ""
              if pred == gt: correct += 1
              print(f"  {slot:>2d} {gt:>3s} {pred:>4s} {probs[top_idx]:.4f} {match}")
          
          print(f"\nAccuracy: {correct}/12 = {correct/12*100:.1f}%")
          PYEOF
      
      - name: Upload ONNX
        uses: actions/upload-artifact@v4
        with:
          name: mahjong-vit-onnx
          path: /tmp/mahjong_vit.onnx
